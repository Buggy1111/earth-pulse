# Keeps the deep-space probe positions live: re-bakes their trajectories from
# NASA JPL HORIZONS every week and commits the result, so the displayed
# positions never drift out of their published ephemeris window (active
# missions like Psyche only publish a month or two ahead). Pushing to main
# triggers a fresh Vercel deploy automatically.
name: Refresh probe trajectories

on:
  schedule:
    - cron: '0 4 * * 1' # every Monday 04:00 UTC
  workflow_dispatch: {} # allow a manual run from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Re-bake probe trajectories from JPL HORIZONS
        run: node scripts/fetch-probes.mjs
      - name: Commit if the positions changed
        run: |
          if git diff --quiet -- public/probes/probes.json; then
            echo "Probe trajectories unchanged."
          else
            git config user.name "probe-refresh bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/probes/probes.json
            git commit -m "🛰 chore: refresh probe trajectories from JPL HORIZONS"
            git push
          fi
