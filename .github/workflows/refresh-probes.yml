# Keeps the baked live-data snapshots fresh with one weekly run:
#  - deep-space probe trajectories from NASA JPL HORIZONS (active missions like
#    Psyche only publish a month or two ahead — without refreshes they freeze)
#  - the Starlink TLE snapshot + the curated famous-satellite TLEs from
#    Celestrak (SGP4 propagation of stale elements drifts within days; the
#    starlink unit test is the canary that fires when this rots)
# Pushing to main triggers a fresh Vercel deploy automatically.
# Actions are pinned to commit SHAs — this workflow holds contents:write, so a
# hijacked mutable tag could commit straight to production.
name: Refresh live-data snapshots

on:
  schedule:
    - cron: '0 4 * * 1' # every Monday 04:00 UTC
  workflow_dispatch: {} # allow a manual run from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Re-bake probe trajectories from JPL HORIZONS
        run: node scripts/fetch-probes.mjs
      - name: Refresh Starlink + famous-satellite TLEs from Celestrak
        run: |
          node scripts/fetch-starlink.mjs
          node scripts/fetch-famous.mjs
      - name: Commit if any snapshot changed
        run: |
          FILES="public/probes/probes.json public/tle/starlink.txt public/tle/famous.txt"
          if git diff --quiet -- $FILES; then
            echo "All snapshots unchanged."
          else
            git config user.name "data-refresh bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add $FILES
            git commit -m "🛰 chore: refresh probe + TLE snapshots (HORIZONS, Celestrak)"
            git push
          fi
