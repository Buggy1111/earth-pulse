<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / installable app -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Earth Pulse" />

    <!-- Primary SEO -->
    <title>Earth Pulse — the planet, live in 3D (earthquakes, satellites, ISS, aurora)</title>
    <meta
      name="description"
      content="Earth Pulse is a free, real-time 3D globe of our planet: live earthquakes, ~150 real satellites with clickable orbits, the ISS, the aurora, real day & night with city lights, plus a full solar-system mode with the Moon and planets. Runs in the browser — no backend, no API keys, open source."
    />
    <meta
      name="keywords"
      content="real-time 3D globe, live earthquakes map, satellite tracker, ISS tracker, aurora map, solar system simulator, WebGL globe, space weather, three.js globe, interactive earth visualization, open source"
    />
    <meta name="author" content="Michal (Buggy1111)" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#02030a" />
    <meta name="color-scheme" content="dark" />
    <link rel="canonical" href="https://earth-pulse-rosy.vercel.app/" />

    <!-- Open Graph (Facebook, LinkedIn, Discord, Reddit, Slack…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Earth Pulse" />
    <meta property="og:title" content="Earth Pulse — the planet, live in 3D" />
    <meta
      property="og:description"
      content="A free real-time 3D globe: live earthquakes, real satellites with orbits, the ISS, aurora, city lights along the day/night line, plus a full solar-system mode. No backend, no API keys, open source."
    />
    <meta property="og:url" content="https://earth-pulse-rosy.vercel.app/" />
    <meta property="og:image" content="https://earth-pulse-rosy.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="A live 3D Earth with city lights and glowing satellite orbit trails arcing around the globe." />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Earth Pulse — the planet, live in 3D" />
    <meta
      name="twitter:description"
      content="Live earthquakes, real satellites & the ISS, aurora, city lights and a full solar-system mode — a real-time 3D globe in your browser. Free & open source."
    />
    <meta name="twitter:image" content="https://earth-pulse-rosy.vercel.app/og-image.png" />
    <meta name="twitter:image:alt" content="A live 3D Earth with city lights and glowing satellite orbit trails." />

    <!-- Structured data for search & AI engines (GEO) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Earth Pulse",
        "alternateName": "Earth Pulse — the planet, live",
        "url": "https://earth-pulse-rosy.vercel.app/",
        "description": "A free, real-time interactive 3D globe of Earth showing live earthquakes, around 150 real satellites with clickable orbits, the International Space Station, the aurora, real day and night with city lights, and live Wikipedia edits — plus a full solar-system mode with the Moon, planets and their moons. Runs entirely in the browser with no backend and no API keys.",
        "applicationCategory": "EducationalApplication",
        "applicationSubCategory": "Data visualization",
        "operatingSystem": "Any (modern web browser with WebGL)",
        "browserRequirements": "Requires JavaScript and WebGL",
        "inLanguage": "en",
        "isAccessibleForFree": true,
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "license": "https://opensource.org/licenses/MIT",
        "image": "https://earth-pulse-rosy.vercel.app/og-image.png",
        "screenshot": "https://earth-pulse-rosy.vercel.app/og-image.png",
        "author": {
          "@type": "Person",
          "name": "Michal",
          "url": "https://github.com/Buggy1111"
        },
        "featureList": [
          "Live earthquakes from USGS and EMSC with magnitude-scaled glow",
          "Around 150 real satellites tracked with SGP4, with clickable comet-trail orbits",
          "Live International Space Station position with follow camera",
          "Real day and night terminator with city lights",
          "Live aurora driven by NOAA space-weather Kp index",
          "Latest natural events from NASA EONET (wildfires, storms, volcanoes, ice)",
          "NASA GIBS vital-signs imagery layers with a date playback slider",
          "Full solar-system mode: the Sun, eight planets, the Moon and major moons on true orbits with time-warp",
          "Cinematic kiosk/screensaver tour after idle",
          "Shareable view links, geolocation and ISS pass prediction"
        ],
        "keywords": "real-time 3D globe, live earthquakes, satellite tracker, ISS tracker, aurora map, solar system, WebGL, space weather, three.js"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
